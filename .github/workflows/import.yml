name: Import Folder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Clone source repo
        run: git clone --depth 1 https://github.com/nousagigang/nousagigang.git source

      - name: Replace config folder
        run: |
          rm -rf content/news
          cp -R source/content ./content

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/news

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Import content/news folder from nousagigang/nousagigang"
            git push origin HEAD:main
          fi
